<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Balcony Music Club | Real JazzyCat Homepage</title>
  <style>
    *{box-sizing:border-box}
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#05020c}
    iframe{position:fixed;inset:0;width:100%;height:100%;border:0;background:#05020c;z-index:1}
    .brand-click-fix{position:fixed;left:calc((100vw - min(1500px, calc(100vw - 36px))) / 2 + 18px);top:30px;z-index:30;width:clamp(250px,20vw,390px);height:126px;display:block;text-indent:-9999px;overflow:hidden}
    .realcat-home-overlay{position:fixed;left:0;right:0;bottom:34px;z-index:12;display:grid;grid-template-columns:260px repeat(4,minmax(70px,150px));justify-content:center;align-items:end;gap:clamp(6px,2vw,24px);padding:0 20px;pointer-events:none}
    .realcat-home-overlay img{width:auto;height:clamp(110px,12vw,165px);object-fit:contain;filter:drop-shadow(0 12px 12px rgba(0,0,0,.55)) drop-shadow(0 0 10px rgba(255,210,91,.22));transform-origin:center bottom;animation:realcatStep 4.8s steps(8) infinite;}
    .realcat-home-overlay .slot-one{grid-column:3;animation-delay:-.6s}
    .realcat-home-overlay .slot-two{grid-column:5;animation-delay:-1.8s}
    @keyframes realcatStep{0%,100%{transform:translateY(0) scaleX(1)}10%{transform:translateY(-5px) scaleX(1)}22%{transform:translateY(0) scaleX(1)}42%{transform:translateY(-4px) scaleX(-1)}52%{transform:translateY(0) scaleX(-1)}64%{transform:translateY(-4px) scaleX(-1)}76%{transform:translateY(0) scaleX(1)}88%{transform:translateY(-3px) scaleX(1)}}
    @media(max-width:760px){.brand-click-fix{left:18px;top:30px;width:190px;height:96px}.realcat-home-overlay{grid-template-columns:repeat(4,minmax(54px,96px));bottom:28px;gap:0;padding:0}.realcat-home-overlay .slot-one{grid-column:2}.realcat-home-overlay .slot-two{grid-column:4}.realcat-home-overlay img{height:96px;margin-left:-12px}}
  </style>
</head>
<body>
  <iframe src="./index.html?v=20260626-realcat-source" title="Balcony Music Club homepage" loading="eager"></iframe>
  <a class="brand-click-fix" href="https://www.balconymusicclub.com/" aria-label="Balcony Music Club official homepage">Balcony Music Club official homepage</a>
  <div class="realcat-home-overlay" aria-hidden="true">
    <img class="slot-one" src="https://floydclaptonblues.github.io/JazzyCatBotAI/assets/real-jazzycat/jazzycat-photo-center.png?v=20260626e" alt="">
    <img class="slot-two" src="https://floydclaptonblues.github.io/JazzyCatBotAI/assets/real-jazzycat/jazzycat-photo-trumpet-right.png?v=20260626e" alt="">
  </div>
</body>
</html>
