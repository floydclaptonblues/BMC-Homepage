<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BMC Radio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: transparent;
    }

    #bmc-radio-wrap,
    #bmc-radio-wrap * {
      box-sizing: border-box;
      font-family: 'DotGothic16','MS Gothic','Chicago',sans-serif;
    }

    #bmc-radio-wrap {
      width: 100%;
      margin: 0;
      padding: 6px 8px;
    }

    #bmc-radio-bar {
      position: relative;
      overflow: hidden;
      min-height: 48px;
      border: 1px solid rgba(143,252,255,.86);
      border-radius: 999px;
      background:
        linear-gradient(rgba(10,10,35,.54), rgba(28,0,52,.64)),
        url('https://img-cdn.publive.online/filters:format(webp)/indigomusic/media/post_attachments/wp-content/uploads/2024/06/Vaporwave-aesthetic-1.jpg') center center / cover no-repeat;
      box-shadow:
        0 0 0 1px rgba(255,255,255,.13) inset,
        0 0 12px rgba(0,255,255,.18),
        0 0 22px rgba(255,0,180,.12);
      color: #fff;
    }

    #bmc-radio-bar::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(to bottom, rgba(255,255,255,.07), rgba(255,255,255,0)),
        repeating-linear-gradient(
          to bottom,
          rgba(255,255,255,.035) 0,
          rgba(255,255,255,.035) 1px,
          transparent 1px,
          transparent 3px
        );
      opacity: .42;
      mix-blend-mode: screen;
    }

    .bmc-radio-inner {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: auto minmax(145px, 1fr) auto minmax(100px, 190px) auto auto;
      align-items: center;
      gap: 8px;
      padding: 6px 9px;
    }

    .bmc-radio-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      padding: 0 9px;
      border-radius: 999px;
      border: 1px solid rgba(143,252,255,.55);
      background: rgba(0,0,0,.32);
      color: #8ffcff;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 1px;
      text-transform: uppercase;
      white-space: nowrap;
      box-shadow: 0 0 8px rgba(143,252,255,.16);
    }

    .bmc-radio-track {
      min-width: 0;
      line-height: 1;
    }

    #bmcNowPlaying {
      display: block;
      color: #fff;
      font-size: 13px;
      text-shadow: 0 0 8px rgba(255,0,200,.35);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bmc-radio-sub {
      display: block;
      margin-top: 3px;
      color: #ffd8fa;
      font-size: 9px;
      letter-spacing: .7px;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #bmcPlayBtn {
      appearance: none;
      border: none;
      cursor: pointer;
      min-height: 30px;
      padding: 0 12px;
      border-radius: 999px;
      background: linear-gradient(90deg,#ff4fd8,#7df9ff);
      color: #16001f;
      font-size: 11px;
      font-weight: 900;
      white-space: nowrap;
      box-shadow: 0 0 12px rgba(255,0,184,.28);
    }

    #bmcPlayBtn:active {
      transform: translateY(1px);
    }

    .bmc-radio-meter {
      width: 100%;
      height: 7px;
      border-radius: 999px;
      background: rgba(255,255,255,.16);
      overflow: hidden;
      box-shadow: inset 0 0 6px rgba(0,0,0,.35);
    }

    #bmcProgress {
      display: block;
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg,#7df9ff,#ff4fd8);
      box-shadow: 0 0 10px rgba(125,249,255,.55);
    }

    #bmcTime {
      min-width: 74px;
      text-align: right;
      font-size: 10px;
      color: #eefcff;
      text-shadow: 0 0 5px rgba(125,249,255,.30);
      white-space: nowrap;
    }

    .bmc-radio-vol {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 30px;
      padding: 0 9px;
      border-radius: 999px;
      background: rgba(0,0,0,.24);
      border: 1px solid rgba(255,255,255,.14);
      color: #fff;
      font-size: 10px;
      white-space: nowrap;
    }

    #bmcVolume {
      width: 66px;
      accent-color: #7df9ff;
    }

    #bmcAudio {
      display: none;
    }

    @media (max-width: 760px) {
      html,
      body {
        overflow: hidden;
      }

      #bmc-radio-wrap {
        padding: 5px 6px;
      }

      #bmc-radio-bar {
        border-radius: 14px;
      }

      .bmc-radio-inner {
        grid-template-columns: 1fr auto;
        gap: 7px;
        padding: 8px;
      }

      .bmc-radio-badge,
      .bmc-radio-meter,
      #bmcTime,
      .bmc-radio-vol {
        grid-column: 1 / -1;
      }

      .bmc-radio-track {
        grid-column: 1 / 2;
      }

      #bmcPlayBtn {
        grid-column: 2 / 3;
      }

      #bmcTime {
        text-align: left;
      }

      .bmc-radio-vol {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div id="bmc-radio-wrap">
    <div id="bmc-radio-bar" role="region" aria-label="BMC Radio player">
      <div class="bmc-radio-inner">
        <div class="bmc-radio-badge">BMC Radio</div>
        <div class="bmc-radio-track">
          <strong id="bmcNowPlaying">Parade On Esplanade</strong>
          <span class="bmc-radio-sub">Balcony Music Club Signal • Autoplay Requested</span>
        </div>
        <button id="bmcPlayBtn" type="button">▶ Play</button>
        <div class="bmc-radio-meter" aria-hidden="true"><span id="bmcProgress"></span></div>
        <div id="bmcTime">0:00 / 0:00</div>
        <label class="bmc-radio-vol">Vol <input id="bmcVolume" type="range" min="0" max="1" step="0.01" value="0.18"></label>
        <audio id="bmcAudio" preload="auto" autoplay playsinline></audio>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var playlist = [
        {
          title: "Parade On Esplanade",
          src: "https://img1.wsimg.com/blobby/go/fcde905d-e711-4bbd-8961-6b9df0cf58b2/downloads/a862837f-91fa-448b-bb7a-8e02d7e68ac7/ONE%20MO_%20_GIN.mp3?ver=1775241263886"
        },
        {
          title: "Ghost Parade On Canal",
          src: "https://img1.wsimg.com/blobby/go/fcde905d-e711-4bbd-8961-6b9df0cf58b2/downloads/f079c265-e581-4b05-a37d-65b396267fb1/Ghost%20Parade%20on%20Canal.mp3?ver=1774633564261"
        }
      ];

      var audio = document.getElementById("bmcAudio");
      var playBtn = document.getElementById("bmcPlayBtn");
      var vol = document.getElementById("bmcVolume");
      var progress = document.getElementById("bmcProgress");
      var time = document.getElementById("bmcTime");
      var titleEl = document.getElementById("bmcNowPlaying");
      var currentIndex = 0;

      function fmt(seconds) {
        if (!Number.isFinite(seconds)) return "0:00";
        var minutes = Math.floor(seconds / 60);
        var secs = Math.floor(seconds % 60);
        return minutes + ":" + (secs < 10 ? "0" + secs : secs);
      }

      function updateButton() {
        playBtn.textContent = audio.paused ? "▶ Play" : "❚❚ Pause";
      }

      function updateTime() {
        var cur = audio.currentTime || 0;
        var dur = audio.duration || 0;
        var pct = dur ? Math.min(100, Math.max(0, (cur / dur) * 100)) : 0;
        progress.style.width = pct + "%";
        time.textContent = fmt(cur) + " / " + fmt(dur);
      }

      function setTrack(index, shouldPlay) {
        currentIndex = ((index % playlist.length) + playlist.length) % playlist.length;
        var track = playlist[currentIndex];
        try { audio.pause(); } catch (e) {}
        audio.src = track.src;
        titleEl.textContent = track.title;
        audio.volume = parseFloat(vol.value || "0.18");
        audio.load();
        updateTime();
        if (shouldPlay) startAudio();
        else updateButton();
      }

      function startAudio() {
        audio.muted = false;
        audio.volume = parseFloat(vol.value || "0.18");
        var promise = audio.play();
        if (promise && typeof promise.then === "function") {
          promise.then(updateButton).catch(updateButton);
        } else {
          updateButton();
        }
      }

      function nextTrack() {
        setTrack(currentIndex + 1, true);
      }

      playBtn.addEventListener("click", function () {
        if (audio.paused) startAudio();
        else {
          audio.pause();
          updateButton();
        }
      });

      vol.addEventListener("input", function () {
        audio.volume = parseFloat(vol.value || "0.18");
      });

      audio.addEventListener("timeupdate", updateTime);
      audio.addEventListener("loadedmetadata", updateTime);
      audio.addEventListener("play", updateButton);
      audio.addEventListener("pause", updateButton);
      audio.addEventListener("ended", nextTrack);

      document.addEventListener("visibilitychange", function () {
        if (document.hidden) {
          try { audio.pause(); } catch (e) {}
          updateButton();
        }
      });

      setTrack(0, false);
      window.setTimeout(startAudio, 350);
      updateButton();
      updateTime();
    })();
  </script>
</body>
</html>
