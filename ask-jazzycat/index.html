<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Balcony Music Club • Ask JazzyCat</title>
  <meta name="description" content="Ask JazzyCat with the 8-bit house cat plus the animated Real JazzyCat photo counterpart." />
  <style>
    *{box-sizing:border-box}
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#05020c;color:#fff6e8}
    iframe{position:fixed;inset:0;width:100%;height:100%;border:0;background:#05020c;z-index:1}
    .fallback{position:fixed;left:12px;bottom:12px;z-index:30;font:700 12px/1.35 Geneva,Verdana,Arial,sans-serif;color:#fff6e8;background:rgba(5,2,12,.72);border:1px solid rgba(255,216,87,.45);padding:8px 10px;border-radius:10px}
    .fallback a{color:#5ee6ff}
    .real-jazzycat-strip{position:fixed;left:0;right:0;top:70px;z-index:25;display:grid;grid-template-columns:repeat(4,minmax(58px,132px));justify-content:center;align-items:start;gap:clamp(12px,3vw,42px);padding:0 12px;pointer-events:none}
    .real-jazzycat-strip img{width:100%;max-height:150px;object-fit:contain;opacity:.96;filter:drop-shadow(0 12px 14px rgba(0,0,0,.58));transform-origin:50% 100%;will-change:transform}
    .real-jazzycat-strip img:nth-child(1){animation:catA 3.1s ease-in-out infinite}
    .real-jazzycat-strip img:nth-child(2){animation:catB 3.7s ease-in-out infinite -.9s}
    .real-jazzycat-strip img:nth-child(3){animation:catC 2.9s ease-in-out infinite -1.4s}
    .real-jazzycat-strip img:nth-child(4){animation:catD 4.2s ease-in-out infinite -2.2s}
    @keyframes catA{0%,100%{transform:translate(-3px,0) rotate(-1.2deg)}50%{transform:translate(3px,-9px) rotate(.7deg)}}
    @keyframes catB{0%,100%{transform:translate(2px,8px) rotate(.8deg)}50%{transform:translate(-4px,-4px) rotate(-.9deg)}}
    @keyframes catC{0%,100%{transform:translate(4px,3px) rotate(-.4deg)}50%{transform:translate(-2px,-10px) rotate(1.1deg)}}
    @keyframes catD{0%,100%{transform:translate(-2px,10px) rotate(.5deg)}50%{transform:translate(4px,-3px) rotate(-1deg)}}
    @media(max-width:680px){.real-jazzycat-strip{top:62px;grid-template-columns:repeat(4,minmax(44px,84px));gap:4px;padding:0 5px}}
    @media(prefers-reduced-motion:reduce){.real-jazzycat-strip img{animation:none}}
  </style>
</head>
<body>
  <iframe src="https://floydclaptonblues.github.io/JazzyCatBotAI/jazzycat.html?v=20260626-public-inline" title="Ask JazzyCat"></iframe>
  <div class="real-jazzycat-strip" aria-hidden="true">
    <img alt="" decoding="async" data-cat-slot="0" src="https://floydclaptonblues.github.io/JazzyCatBotAI/assets/real-jazzycat/jazzycat-photo-trumpet-left.png?v=20260626e">
    <img alt="" decoding="async" data-cat-slot="1" src="https://floydclaptonblues.github.io/JazzyCatBotAI/assets/real-jazzycat/jazzycat-photo-center.png?v=20260626e">
    <img alt="" decoding="async" data-cat-slot="2" src="https://floydclaptonblues.github.io/JazzyCatBotAI/assets/real-jazzycat/jazzycat-photo-trumpet-right.png?v=20260626e">
    <img alt="" decoding="async" data-cat-slot="3" src="https://floydclaptonblues.github.io/JazzyCatBotAI/assets/real-jazzycat/jazzycat-photo-center-look-up-alt.png?v=20260626e">
  </div>
  <div class="fallback"><a href="https://floydclaptonblues.github.io/JazzyCatBotAI/jazzycat.html?v=20260626-public-inline">Open standard JazzyCat</a></div>
  <script>
    (() => {
      const root = 'https://floydclaptonblues.github.io/JazzyCatBotAI/assets/real-jazzycat/';
      const version = '20260626e';
      const frames = [
        'jazzycat-photo-trumpet-left.png',
        'jazzycat-photo-center.png',
        'jazzycat-photo-trumpet-right.png',
        'jazzycat-photo-center-look-up-alt.png'
      ].map(name => root + name + '?v=' + version);
      const sequences = [
        [0,1,0,3,1,2],
        [1,3,1,2,0,1],
        [2,1,2,3,1,0],
        [3,1,0,1,2,3]
      ];
      const durations = [620, 760, 680, 840];
      document.querySelectorAll('.real-jazzycat-strip img').forEach((img, slot) => {
        let i = 0;
        const seq = sequences[slot] || sequences[0];
        const tick = () => {
          img.src = frames[seq[i % seq.length]];
          i += 1;
          window.setTimeout(tick, durations[slot] + ((i % 3) - 1) * 80 + slot * 90);
        };
        window.setTimeout(tick, 180 + slot * 140);
      });
    })();
  </script>
</body>
</html>
